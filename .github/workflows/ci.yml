name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck and zsh
        run: sudo apt-get update && sudo apt-get install -y shellcheck zsh

      - name: shellcheck bash scripts
        run: shellcheck install.sh uninstall.sh integrations/*.sh

      - name: zsh -n syntax check
        run: |
          for f in lib/*.zsh lib/sections/*.zsh themes/*.zsh; do
            zsh -n "$f" || exit 1
          done

  install-linux:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install runtime deps
        run: sudo apt-get update && sudo apt-get install -y zsh git fzf

      - name: Run installer against a scratch HOME
        run: |
          export FAKE_HOME="$RUNNER_TEMP/fake-home"
          mkdir -p "$FAKE_HOME"
          HOME="$FAKE_HOME" \
          SPACESHIP_SUNSET_SOURCE="$PWD" \
          SPACESHIP_SUNSET_THEME=nord-vibrant-orange \
            bash ./install.sh

      - name: Verify state file + managed block
        run: |
          export FAKE_HOME="$RUNNER_TEMP/fake-home"
          test "$(cat "$FAKE_HOME/.spaceship-sunset/state/active_theme")" = "nord-vibrant-orange"
          grep -q '# >>> spaceship-sunset >>>' "$FAKE_HOME/.zshrc"
          grep -q '# <<< spaceship-sunset <<<' "$FAKE_HOME/.zshrc"

      - name: Idempotency — re-run installer
        run: |
          export FAKE_HOME="$RUNNER_TEMP/fake-home"
          HOME="$FAKE_HOME" \
          SPACESHIP_SUNSET_SOURCE="$PWD" \
          SPACESHIP_SUNSET_THEME=nord-vibrant-orange \
            bash ./install.sh
          count=$(grep -c '# >>> spaceship-sunset >>>' "$FAKE_HOME/.zshrc")
          test "$count" = "1" || { echo "managed block duplicated: $count"; exit 1; }

      - name: Uninstall restores original state
        run: |
          export FAKE_HOME="$RUNNER_TEMP/fake-home"
          HOME="$FAKE_HOME" bash ./uninstall.sh
          ! grep -q 'spaceship-sunset' "$FAKE_HOME/.zshrc" 2>/dev/null || {
            echo 'managed block not fully removed'; exit 1; }
          test ! -d "$FAKE_HOME/.spaceship-sunset" || {
            echo 'state dir not cleaned'; exit 1; }

      - name: init.zsh loads under real zsh
        run: |
          export FAKE_HOME="$RUNNER_TEMP/fake-home2"
          mkdir -p "$FAKE_HOME"
          HOME="$FAKE_HOME" \
          SPACESHIP_SUNSET_SOURCE="$PWD" \
          SPACESHIP_SUNSET_THEME=nord-vibrant-orange \
            bash ./install.sh
          HOME="$FAKE_HOME" zsh -c 'source "$HOME/.spaceship-sunset/vendor/repo/lib/init.zsh" 2>/dev/null || source '"$PWD"'/lib/init.zsh; echo OK'

  install-macos:
    runs-on: macos-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Verify BSD sed + zsh are present
        run: |
          sed --version 2>&1 | head -1 || true   # BSD sed has no --version
          zsh --version
          command -v fzf || brew install fzf

      - name: Run installer against a scratch HOME
        run: |
          export FAKE_HOME="$RUNNER_TEMP/fake-home"
          mkdir -p "$FAKE_HOME"
          HOME="$FAKE_HOME" \
          SPACESHIP_SUNSET_SOURCE="$PWD" \
          SPACESHIP_SUNSET_THEME=nord-vibrant-orange \
            bash ./install.sh

      - name: Verify state file + managed block
        run: |
          export FAKE_HOME="$RUNNER_TEMP/fake-home"
          test "$(cat "$FAKE_HOME/.spaceship-sunset/state/active_theme")" = "nord-vibrant-orange"
          grep -q '# >>> spaceship-sunset >>>' "$FAKE_HOME/.zshrc"
          grep -q '# <<< spaceship-sunset <<<' "$FAKE_HOME/.zshrc"

      - name: Idempotency — re-run installer
        run: |
          export FAKE_HOME="$RUNNER_TEMP/fake-home"
          HOME="$FAKE_HOME" \
          SPACESHIP_SUNSET_SOURCE="$PWD" \
          SPACESHIP_SUNSET_THEME=nord-vibrant-orange \
            bash ./install.sh
          count=$(grep -c '# >>> spaceship-sunset >>>' "$FAKE_HOME/.zshrc")
          test "$count" = "1" || { echo "managed block duplicated: $count"; exit 1; }

      - name: Uninstall restores original state
        run: |
          export FAKE_HOME="$RUNNER_TEMP/fake-home"
          HOME="$FAKE_HOME" bash ./uninstall.sh
          ! grep -q 'spaceship-sunset' "$FAKE_HOME/.zshrc" 2>/dev/null || {
            echo 'managed block not fully removed'; exit 1; }
          test ! -d "$FAKE_HOME/.spaceship-sunset" || {
            echo 'state dir not cleaned'; exit 1; }

      - name: BSD sed in-place — set_theme rewrites a sample config
        run: |
          export FAKE_HOME="$RUNNER_TEMP/fake-home3"
          mkdir -p "$FAKE_HOME/.config/bat"
          printf '%s\n' '--theme="OneHalfDark"' > "$FAKE_HOME/.config/bat/config"
          HOME="$FAKE_HOME" \
          SPACESHIP_SUNSET_SOURCE="$PWD" \
          SPACESHIP_SUNSET_THEME=nord-vibrant-orange \
            bash ./install.sh
          grep -q 'Nord' "$FAKE_HOME/.config/bat/config" || {
            echo 'bat config was not rewritten by BSD sed'
            cat "$FAKE_HOME/.config/bat/config"
            exit 1; }
          test -f "$FAKE_HOME/.config/bat/config.spaceship-sunset.bak"
